services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expense_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=expense_manager;Username=postgres;Password=postgres"
      Jwt__Secret: "docker-dev-secret-key-change-in-production-min-32-chars"
      Jwt__Issuer: "ExpenseManager"
      Jwt__Audience: "ExpenseManagerClient"
      Jwt__ExpirationInMinutes: "60"
      Jwt__RefreshTokenExpirationInDays: "7"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
